services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_council
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: nexus_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/nexus_council
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./model_cache:/root/.cache/torch/sentence_transformers # <--- ADDED
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    container_name: nexus_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/nexus_council
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./model_cache:/root/.cache/torch/sentence_transformers # <--- ADDED
    depends_on:
      - api
      - redis
        
  dashboard:
    build: .
    container_name: nexus_dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data: